  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script>
    function showSection(id) {
      document.getElementById('reservations').style.display = 'none';
      document.getElementById('chats').style.display = 'none';
      document.getElementById(id).style.display = 'block';
      document.getElementById('pageTitle').innerText = id.charAt(0).toUpperCase() + id.slice(1);

      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => item.classList.remove('active'));
      const activeItem = Array.from(navItems).find(item => item.innerText.trim().toLowerCase().includes(id.toLowerCase()));
      if (activeItem) activeItem.classList.add('active');
    }

    function loadData() {
      const res = JSON.parse(localStorage.getItem('aura_reservations') || '[]');
      const chats = JSON.parse(localStorage.getItem('aura_chats') || '[]');

      document.getElementById('totalRes').innerText = res.length;
      document.getElementById('pendingChats').innerText = chats.length;

      const resTable = document.getElementById('resTable');
      resTable.innerHTML = '';
      res.slice().reverse().forEach((r, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.name}</td>
          <td>${r.phone}</td>
          <td>${r.date} at ${r.time}</td>
          <td>${r.person}</td>
          <td><span class="status-badge ${r.status === 'confirmed' ? 'status-confirmed' : 'status-pending'}">${r.status || 'Pending'}</span></td>
          <td>
            <button class="btn-action" onclick="handleRes(${idx}, 'confirmed')">Confirm</button>
            <button class="btn-action" onclick="deleteRes(${idx})">Delete</button>
          </td>
        `;
        resTable.appendChild(tr);
      });

      const chatList = document.getElementById('chatList');
      chatList.innerHTML = '';
      chats.slice().reverse().forEach((c, idx) => {
        const div = document.createElement('div');
        div.style.marginBottom = '20px';
        div.style.borderBottom = '1px solid #333';
        div.style.paddingBottom = '15px';
        div.innerHTML = `
          <p style="color: var(--gold); font-weight: bold; margin-bottom: 5px;">Customer Message:</p>
          <p style="margin-bottom: 10px;">${c.msg}</p>
          <div class="chat-reply-box">
            <input type="text" class="input-reply" placeholder="Type your reply...">
            <button class="btn-action" onclick="replyChat(${idx})">Send Reply</button>
          </div>
        `;
        chatList.appendChild(div);
      });
    }

    window.handleRes = function (idx, status) {
      const res = JSON.parse(localStorage.getItem('aura_reservations') || '[]');
      res[res.length - 1 - idx].status = status;
      localStorage.setItem('aura_reservations', JSON.stringify(res));
      loadData();
    }

    window.deleteRes = function (idx) {
      const res = JSON.parse(localStorage.getItem('aura_reservations') || '[]');
      res.splice(res.length - 1 - idx, 1);
      localStorage.setItem('aura_reservations', JSON.stringify(res));
      loadData();
    }

    window.replyChat = function (idx) {
      alert("Reply sent! In a real app, this would notify the customer via the chatbot.");
      const chats = JSON.parse(localStorage.getItem('aura_chats') || '[]');
      chats.splice(chats.length - 1 - idx, 1);
      localStorage.setItem('aura_chats', JSON.stringify(chats));
      loadData();
    }

    window.showSection = showSection;

    loadData();
    setInterval(loadData, 3000); 
  </script>
